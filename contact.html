<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .navbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(20px); border-radius: 50px; padding: 10px 40px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        
        .contact-box { background: #0a0a0a; padding: 60px; border-radius: 40px; border: 1px solid #1a1a1a; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .form-control { background: #111; border: 1px solid #222; color: white; border-radius: 15px; padding: 15px; transition: 0.4s; }
        .form-control:focus { background: #151515; border-color: #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); color: white; }
        .btn-cyan { background: #00d2ff; color: black; width: 100%; border: none; padding: 16px; border-radius: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        footer { text-align: center; padding: 40px 0; color: #222; letter-spacing: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand"><ul class="navbar-nav"><a class="nav-link text-secondary px-3" href="index.html">HOME</a><a class="nav-link text-secondary px-3" href="aboutme.html">ABOUT</a><a class="nav-link text-secondary px-3" href="projects.html">PROJECTS</a><a class="nav-link active text-info px-3" href="contact.html">CONTACT</a></ul></nav>

    <div class="container" style="padding-top: 150px;">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="contact-box">
                    <h2 class="text-center fw-bold mb-5 display-5">CONTACT <span style="color: #00d2ff;">ME</span></h2>
                    <form id="contactForm">
                        <div class="mb-3"><input type="text" id="n" class="form-control" placeholder="YOUR NAME" required></div>
                        <div class="mb-3"><input type="email" class="form-control" placeholder="EMAIL ADDRESS" required></div>
                        <div class="mb-3"><textarea class="form-control" rows="4" placeholder="HOW CAN I HELP?" required></textarea></div>
                        <button type="submit" class="btn-cyan">SEND MESSAGE</button>
                    </form>
                    <div id="stat" class="mt-4 text-center text-info fw-bold"></div>
                </div>
            </div>
        </div>
    </div>
    <footer>BY MOHAMED ABDELRAHMAN</footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const n = document.getElementById('n').value;
            document.getElementById('stat').innerText = `SENT SUCCESSFULLY! THANKS ${n}.`;
            this.reset();
        });
    </script>
</body>
</html>
